{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Login - CyM Generadores</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1c1f26, #2f3542);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-container {
            height: 100vh;
        }

        .login-card {
            width: 380px;
            background: #2b2f3a;
            border-radius: 15px;
            padding: 35px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
            border: 1px solid #3a3f4b;
        }

        .logo {
            width: 90px;
            display: block;
            margin: 0 auto 20px;
        }

        h4 {
            color: #ffffff;
            font-weight: 600;
        }

        label {
            color: #cfd3dc;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            padding-right: 40px; /* espacio para el icono */
            border-radius: 8px;
            border: none;
            background: #1f232b;
            color: white;
            margin-top: 5px;
        }

        input:focus {
            outline: none;
            border: 1px solid #0d6efd;
            box-shadow: 0 0 5px #0d6efd;
        }

        .btn-primary {
            background: #0d6efd;
            border: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #0b5ed7;
        }

        .alert {
            font-size: 14px;
        }

        /* ICONO DENTRO DEL INPUT */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #aaa;
            font-size: 18px;
        }

        .toggle-password:hover {
            color: #0d6efd;
        }
    </style>
</head>

<body>

<div class="container login-container d-flex justify-content-center align-items-center">
    
    <div class="login-card">

        <!-- LOGO -->
        <img src="{% static 'img/Logo.png' %}" class="logo" alt="Logo">

        <h4 class="text-center mb-4">CyM Generadores</h4>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label>Correo</label>
                {{ form.email }}
            </div>

            <div class="mb-3 position-relative">
                <label>Contraseña</label>

                {{ form.password }}

                <i class="bi bi-eye-slash toggle-password" onclick="togglePassword()"></i>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">
                Ingresar
            </button>
        </form>

        {% if form.errors %}
            <div class="alert alert-danger mt-3 text-center">
                Credenciales incorrectas
            </div>
        {% endif %}

    </div>

</div>

<!-- SCRIPT MOSTRAR / OCULTAR -->
<script>
function togglePassword() {
    const input = document.querySelector('input[name="password"]');
    const icon = document.querySelector('.toggle-password');

    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        input.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

</body>
</html>
